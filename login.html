<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="card auth-card">
      <h2>Student Login</h2>
      <p class="small">Education App - secure login for students and admin.</p>
      <label>Mobile Number</label>
      <input class="input" id="mobile" type="tel" maxlength="10" placeholder="10 digit mobile" />
      <label>Password</label>
      <input class="input" id="password" type="password" placeholder="Password" />
      <button class="btn btn-primary" style="width:100%;margin-top:12px;" onclick="login()">Login</button>
      <p class="small">New user? <a href="signup.html">Create account</a></p>
      <p class="small">Admin demo: <b>9999999999 / admin123</b></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (getSession()) window.location.href = 'dashboard.html';

    function login() {
      const mobile = document.getElementById('mobile').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!/^\d{10}$/.test(mobile)) return alert('Valid 10 digit mobile number required');
      if (password.length < 4) return alert('Password is too short');

      const user = getUsers().find(u => u.mobile === mobile && u.password === password);
      if (!user) return alert('Invalid credentials');

      setSession({ name: user.name, mobile: user.mobile, role: user.role || 'student' });
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
