<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Notes | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar"><span>📚 PDF Notes</span><button class="btn btn-primary" onclick="location.href='dashboard.html'">Back</button></div>
  <div class="container"><div id="pdfs" class="item-list"></div></div>

  <script src="app.js"></script>
  <script>
    ensureAuth();
    const pdfs = getContent().filter(c => c.type === 'pdf');
    document.getElementById('pdfs').innerHTML = pdfs.map(p => `
      <div class="card item">
        <div>
          <strong>${p.title}</strong><br/>
          <span class="tag ${p.access === 'paid' ? 'tag-paid':'tag-free'}">${p.access.toUpperCase()} ${p.price ? `₹${p.price}`:''}</span>
        </div>
        <div>
          <button class="btn btn-primary" onclick="openPdf('${p.id}')">Read</button>
          ${p.access === 'free' ? `<button class='btn btn-warn' onclick='downloadPdf("${p.url}")'>Download</button>` : ''}
        </div>
      </div>
    `).join('') || '<p class="small">No PDF uploaded yet.</p>';

    function openPdf(id) {
      const item = pdfs.find(p => p.id === id);
      requirePaymentOrOpen(item, () => {
        localStorage.setItem('activePdfId', id);
        location.href = 'pdf.html';
      });
    }

    function downloadPdf(url) { window.open(url, '_blank'); }
  </script>
</body>
</html>
