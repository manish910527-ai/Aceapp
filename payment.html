<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Course - ARTHMETIC</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f4f7f9; }
        
        /* Header */
        .header { background-color: #004a99; color: white; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .back-btn { cursor: pointer; font-weight: bold; font-size: 16px; margin-right: 15px; }
        .title { font-size: 18px; font-weight: bold; }
        
        /* Product Card */
        .product-card { background: white; margin: 20px; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-image { background: linear-gradient(to right, #e65100, #ffca28); height: 150px; display: flex; justify-content: center; align-items: center; color: white; font-size: 50px; }
        .product-details { padding: 20px; }
        .product-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .product-desc { font-size: 14px; color: #666; margin-bottom: 15px; line-height: 1.5; }
        
        /* Price Tag */
        .price-box { display: flex; align-items: center; margin-bottom: 20px; }
        .current-price { font-size: 28px; font-weight: bold; color: #d32f2f; margin-right: 10px; }
        .old-price { font-size: 16px; color: #999; text-decoration: line-through; }
        .discount { background: #4caf50; color: white; padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-left: 10px; }
        
        /* Payment Button */
        .pay-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .secure-text { text-align: center; font-size: 12px; color: #777; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='dashboard.html'">⬅</div>
        <div class="title">Complete Payment</div>
    </div>

    <div class="product-card">
        <div class="product-image">
            🎓
        </div>
        <div class="product-details">
            <div class="product-title">MP CPCT Special Course</div>
            <div class="product-desc">Full access to Mock Tests, PDF Notes, and Live Classes by ARTHMETIC COMPUTER EDUCATION Harda.</div>
            
            <div class="price-box">
                <span class="current-price">₹99</span>
                <span class="old-price">₹499</span>
                <span class="discount">80% OFF</span>
            </div>

            <button class="pay-btn" onclick="payWithUPI()">
                PAY NOW (₹99)
            </button>
            
            <div class="secure-text">
                ✅ Secure Transaction via UPI<br>
                (GPay, PhonePe, Paytm, etc.)
            </div>
        </div>
    </div>

    <script>
        function payWithUPI() {
            // Aapka Updated UPI ID
            let upiId = "9589769913@ybl"; 
            let payeeName = "ARTHMETIC COMPUTER EDUCATION"; 
            let amount = "99.00"; 
            let transactionNote = "CPCT Course Admission";
            
            // UPI Link Generation
            let upiUrl = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&am=${amount}&cu=INR&tn=${encodeURIComponent(transactionNote)}`;
            
            // App ko trigger karna
            window.location.href = upiUrl;
        }
    </script>

</body>
</html>
