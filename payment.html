<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar"><span>💳 Payment Unlock</span><button class="btn btn-primary" onclick="history.back()">Back</button></div>
  <div class="container">
    <div class="card">
      <h3 id="itemName">Content</h3>
      <h1>₹<span id="itemPrice">0</span></h1>
      <p>UPI ID: <b>aceharda@upi</b></p>
      <p class="small">Payment ke baad verify unlock button press karein.</p>
      <button class="btn btn-warn" onclick="window.open('https://wa.me/919589769913','_blank')">Send Screenshot on WhatsApp</button>
      <button class="btn btn-primary" onclick="unlock()">Verify & Unlock (Demo)</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    ensureAuth();
    const itemId = localStorage.getItem('selectedItemId');
    document.getElementById('itemName').textContent = localStorage.getItem('selectedItemName') || 'Premium Content';
    document.getElementById('itemPrice').textContent = localStorage.getItem('selectedItemPrice') || '0';

    function unlock() {
      if (!itemId) return alert('No selected content.');
      unlockItem(itemId);
      alert('Unlocked successfully.');
      location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
