<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Online Test</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; }
        .header { background: #004a99; color: white; padding: 15px; text-align: center; position: sticky; top: 0; }
        .quiz-container { padding: 20px; max-width: 600px; margin: auto; }
        .q-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .option { display: block; padding: 12px; border: 2px solid #ddd; border-radius: 10px; margin-top: 10px; cursor: pointer; }
        .option.selected { border-color: #004a99; background: #e3f2fd; }
        .btn-row { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #timer { font-weight: bold; font-size: 18px; color: #ffca28; }
    </style>
</head>
<body>

<div class="header">
    <div id="testName">Loading...</div>
    <div id="timer">Time: 00:00</div>
</div>

<div class="quiz-container">
    <div id="qArea">
        <div class="q-card"><h3>Loading Questions...</h3></div>
    </div>
    
    <div class="btn-row">
        <button class="btn" style="background:#333; color:white;" onclick="prevQ()">PREVIOUS</button>
        <button class="btn" id="nextBtn" style="background:#004a99; color:white;" onclick="nextQ()">NEXT</button>
    </div>
</div>

<script>
    const MASTER_URL = "APNA_NEW_DEPLOY_URL_YAHAN_DALEIN";
    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('testId');
    
    let questions = [];
    let currentIdx = 0;
    let answers = {};
    let timeLeft = 3600; // 60 Minutes

    window.onload = async () => {
        document.getElementById('testName').innerText = testId;
        try {
            // API se sirf is Test ke sawal mangwana
            let res = await fetch(MASTER_URL + "?action=get_questions&testId=" + encodeURIComponent(testId));
            questions = await res.json();
            if(questions.length > 0) {
                showQuestion();
                startTimer();
            } else {
                document.getElementById('qArea').innerHTML = "<h3>No questions found for this test.</h3>";
            }
        } catch(e) { alert("Data Load Error!"); }
    };

    function startTimer() {
        setInterval(() => {
            if(timeLeft <= 0) submitTest();
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer').innerText = `Time: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            timeLeft--;
        }, 1000);
    }

    function showQuestion() {
        let q = questions[currentIdx];
        let html = `
            <div class="q-card">
                <small>Question ${currentIdx + 1} of ${questions.length}</small>
                <p style="font-size:18px; font-weight:bold;">${q.ques}</p>
                <div class="option ${answers[currentIdx] === 'A' ? 'selected' : ''}" onclick="selectOpt('A')">A) ${q.optA}</div>
                <div class="option ${answers[currentIdx] === 'B' ? 'selected' : ''}" onclick="selectOpt('B')">B) ${q.optB}</div>
                <div class="option ${answers[currentIdx] === 'C' ? 'selected' : ''}" onclick="selectOpt('C')">C) ${q.optC}</div>
                <div class="option ${answers[currentIdx] === 'D' ? 'selected' : ''}" onclick="selectOpt('D')">D) ${q.optD}</div>
            </div>`;
        document.getElementById('qArea').innerHTML = html;
        document.getElementById('nextBtn').innerText = currentIdx === questions.length - 1 ? "SUBMIT" : "NEXT";
    }

    function selectOpt(val) {
        answers[currentIdx] = val;
        showQuestion();
    }

    function nextQ() {
        if(currentIdx < questions.length - 1) {
            currentIdx++;
            showQuestion();
        } else {
            submitTest();
        }
    }

    function prevQ() {
        if(currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function submitTest() {
        let score = 0;
        questions.forEach((q, i) => {
            if(answers[i] === q.ans) score++;
        });
        alert(`Test Submitted!\nYour Score: ${score} / ${questions.length}`);
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
