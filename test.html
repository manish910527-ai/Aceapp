<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take Test | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar"><span id="title">Test</span><button class="btn btn-primary" onclick="location.href='test_list.html'">Back</button></div>
  <div class="container"><div class="card" id="testBox"></div></div>

  <script src="app.js"></script>
  <script>
    ensureAuth();
    const id = localStorage.getItem('activeTestId');
    const test = getContent().find(c => c.id === id && c.type === 'test');
    if (!test) {
      document.getElementById('testBox').innerHTML = '<p>Test not found.</p>';
    } else {
      document.getElementById('title').textContent = `📝 ${test.title}`;
      renderTest(test);
    }

    function renderTest(test) {
      const html = test.questions.map((q, idx) => `
        <div style="margin-bottom:14px;">
          <strong>Q${idx + 1}. ${q.q}</strong>
          ${q.options.map((o, oi) => `<label style="display:block;margin-top:6px;"><input type="radio" name="q_${idx}" value="${oi}" /> ${o}</label>`).join('')}
        </div>
      `).join('') + '<button class="btn btn-primary" onclick="submitTest()">Submit Test</button>';
      document.getElementById('testBox').innerHTML = html;
    }

    function submitTest() {
      let score = 0;
      test.questions.forEach((q, idx) => {
        const selected = document.querySelector(`input[name=q_${idx}]:checked`);
        if (selected && Number(selected.value) === q.answer) score += 1;
      });
      localStorage.setItem('lastResult', JSON.stringify({
        title: test.title,
        score,
        total: test.questions.length,
        date: new Date().toLocaleString()
      }));
      location.href = 'result.html';
    }
  </script>
</body>
</html>
