<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE Online Test</title>
  <style>
    :root { --primary: #004a99; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; }
    .header {
      position: sticky;
      top: 0;
      background: var(--primary);
      color: #fff;
      padding: 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      z-index: 100;
    }
    .header small { opacity: .95; }
    .wrap { max-width: 960px; margin: 0 auto; }
    .q-card {
      background: #fff;
      margin: 14px;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,.08);
    }
    .opt {
      display: block;
      margin-top: 10px;
      border: 1px solid #d5dce5;
      border-radius: 9px;
      padding: 11px;
      cursor: pointer;
      transition: all .15s ease;
    }
    .opt.selected { border-color: var(--primary); background: #e7f0fe; font-weight: 700; }
    .toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 14px 24px;
    }
    button {
      border: none;
      border-radius: 8px;
      color: #fff;
      background: var(--primary);
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #37474f; }
  </style>
</head>
<body>
  <div class="header">
    <div id="tName" style="font-weight:700;">Loading...</div>
    <small id="meta">Question 0 / 0</small>
  </div>

  <div class="wrap">
    <div id="qArea"></div>

    <div class="toolbar">
      <button class="secondary" onclick="goDashboard()">Back</button>
      <button onclick="prevQ()">Prev</button>
      <button onclick="nextQ()" id="nBtn">Next</button>
    </div>
  </div>

  <script>
    const MASTER_URL = "https://script.google.com/macros/s/AKfycbzNKt3R8LQe_BhKsQmjDvSddqx_mPY9kE4NMZ9WPxe-gFyWfhFaUd6GAgW9hxLoBkASVw/exec";
    const params = new URLSearchParams(window.location.search);
    const tid = params.get("testId") || "Test";

    let qs = [];
    let idx = 0;
    const ans = {};

    window.onload = async () => {
      document.getElementById("tName").innerText = tid;
      try {
        const res = await fetch(`${MASTER_URL}?action=get_questions&testId=${encodeURIComponent(tid)}`);
        qs = await res.json();

        if (!Array.isArray(qs) || qs.length === 0) {
          document.getElementById("qArea").innerHTML = `<div class="q-card">No questions found.</div>`;
          document.getElementById("meta").innerText = "Question 0 / 0";
          return;
        }

        showQ();
      } catch (error) {
        document.getElementById("qArea").innerHTML = `<div class="q-card">Error loading questions.</div>`;
      }
    };

    function showQ() {
      const q = qs[idx];
      const qArea = document.getElementById("qArea");

      let html = `<div class="q-card"><p><b>Q${idx + 1}. ${q.ques || "Question"}</b></p>`;
      ["A", "B", "C", "D"].forEach((optionCode) => {
        const selectedClass = ans[idx] === optionCode ? "selected" : "";
        html += `<div class="opt ${selectedClass}" onclick="selOpt('${optionCode}')">${optionCode}. ${q["opt" + optionCode] || ""}</div>`;
      });
      html += "</div>";

      qArea.innerHTML = html;
      document.getElementById("meta").innerText = `Question ${idx + 1} / ${qs.length}`;
      document.getElementById("nBtn").innerText = idx === qs.length - 1 ? "Submit" : "Next";
    }

    function selOpt(v) {
      ans[idx] = v;
      showQ();
    }

    function prevQ() {
      if (idx > 0) {
        idx -= 1;
        showQ();
      }
    }

    function nextQ() {
      if (idx < qs.length - 1) {
        idx += 1;
        showQ();
        return;
      }
      alert("Test Submitted!");
      goDashboard();
    }

    function goDashboard() {
      const keep = new URLSearchParams(window.location.search);
      keep.delete("testId");
      const suffix = keep.toString();
      window.location.href = suffix ? `./dashboard.html?${suffix}` : "./dashboard.html";
    }
  </script>
</body>
</html>
