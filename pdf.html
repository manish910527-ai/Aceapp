<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Reader | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar"><span id="pdfTitle">PDF Reader</span><button class="btn btn-primary" onclick="location.href='pdf_list.html'">Back</button></div>
  <div class="container">
    <div class="card" style="height:80vh;padding:0;overflow:hidden;">
      <iframe id="pdfFrame" style="width:100%;height:100%;border:none;" title="pdf"></iframe>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    ensureAuth();
    const id = localStorage.getItem('activePdfId');
    const pdf = getContent().find(c => c.id === id && c.type === 'pdf');
    if (!pdf) {
      document.getElementById('pdfTitle').textContent = 'PDF Not Found';
    } else {
      document.getElementById('pdfTitle').textContent = pdf.title;
      document.getElementById('pdfFrame').src = pdf.url;
    }
  </script>
</body>
</html>
