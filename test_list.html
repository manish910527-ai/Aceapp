<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tests | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar"><span>📝 Test Series</span><button class="btn btn-primary" onclick="location.href='dashboard.html'">Back</button></div>
  <div class="container">
    <div id="tests" class="item-list"></div>
  </div>
  <script src="app.js"></script>
  <script>
    ensureAuth();
    const tests = getContent().filter(c => c.type === 'test');
    document.getElementById('tests').innerHTML = tests.map(t => `
      <div class="card item">
        <div>
          <strong>${t.title}</strong><br/>
          <span class="tag ${t.access === 'paid' ? 'tag-paid':'tag-free'}">${t.access.toUpperCase()} ${t.price ? `₹${t.price}`:''}</span>
        </div>
        <button class="btn btn-primary" onclick="startTest('${t.id}')">Start</button>
      </div>
    `).join('') || '<p class="small">No tests found.</p>';

    function startTest(id) {
      const item = tests.find(t => t.id === id);
      requirePaymentOrOpen(item, () => {
        localStorage.setItem('activeTestId', id);
        location.href = 'test.html';
      });
    }
  </script>
</body>
</html>
