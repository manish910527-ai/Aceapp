<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE Academy</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #003f84, #004a99 50%, #0c6ecf);
      color: #fff;
    }

    .card {
      width: min(92vw, 460px);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 18px;
      backdrop-filter: blur(7px);
      padding: 24px;
      text-align: center;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #ffca28;
      margin-bottom: 10px;
      animation: blink 1.4s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }

    .banner-wrap {
      border-radius: 12px;
      overflow: hidden;
      margin: 16px 0;
      border: 2px solid rgba(255, 255, 255, 0.4);
    }

    .banner-wrap img { width: 100%; display: block; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    a.btn {
      text-decoration: none;
      display: inline-block;
      padding: 11px 10px;
      border-radius: 9px;
      font-weight: 700;
      color: #fff;
    }

    .btn-login { background: #2e7d32; }
    .btn-dashboard { background: #e64a19; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="ACE Logo" onerror="this.src='https://via.placeholder.com/90?text=ACE'" />
    <h2 style="margin: 6px 0 0;">ACE HARDA</h2>
    <p style="margin: 8px 0 0; opacity: 0.95;">ARITHMETIC COMPUTER EDUCATION</p>

    <div class="banner-wrap">
      <img src="banner.png" alt="ACE Banner" onerror="this.src='https://via.placeholder.com/700x240?text=ACE+Academy'" />
    </div>

    <div class="btn-row">
      <a href="login.html" class="btn btn-login">Student Login</a>
      <a href="dashboard.html" class="btn btn-dashboard">Open Dashboard</a>
    </div>
  </div>
</body>
</html>
