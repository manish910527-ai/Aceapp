<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE Education App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="card auth-card" style="text-align:center;">
      <h1>ACE Education App</h1>
      <p class="small">Professional platform for students: tests, PDFs, video lectures, paid unlock and admin content management.</p>
      <button class="btn btn-primary" onclick="go()">Continue</button>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    function go() {
      if (getSession()) location.href = 'dashboard.html';
      else location.href = 'login.html';
    }
  </script>
</body>
</html>
