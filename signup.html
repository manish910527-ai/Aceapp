<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ACE</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #004a99; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: white; width: 85%; max-width: 400px; padding: 30px 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; position: relative; }
        .logo-icon { font-size: 50px; margin-bottom: 10px; }
        h2 { color: #004a99; margin: 0 0 5px; font-size: 24px; text-transform: uppercase; font-weight: 900; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #333; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; }
        .input-group input:focus { border-color: #004a99; box-shadow: 0 0 5px rgba(0, 74, 153, 0.3); }
        
        .btn { background: #ffca28; color: #b71c1c; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.98); }
        
        .link-text { margin-top: 20px; font-size: 14px; color: #555; }
        .link-text a { color: #004a99; font-weight: bold; text-decoration: none; }
        
        /* Loading Overlay */
        .loader { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); border-radius: 15px; justify-content: center; align-items: center; flex-direction: column; font-weight: bold; color: #004a99; z-index: 10; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #004a99; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span>Registering... Please wait</span>
        </div>
        
        <div class="logo-icon">🎓</div>
        <h2>Join ACE</h2>
        <p>Create your new account</p>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="s_name" placeholder="Enter your name">
        </div>
        <div class="input-group">
            <label>Mobile Number (User ID)</label>
            <input type="number" id="s_mobile" placeholder="Enter 10 digit number">
        </div>
        <div class="input-group">
            <label>Create Password</label>
            <input type="password" id="s_pass" placeholder="Create a strong password">
        </div>

        <button class="btn" onclick="registerUser()">SIGN UP</button>

        <div class="link-text">
            Already registered? <a href="login.html">Login Here</a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyj3rN60WwON-YnY9JyuQQrYPHUoKoR5q9ax0jCiqcK6EJeDRwlWlPXeJUtfe3vzc-k/exec";

        async function registerUser() {
            let name = document.getElementById("s_name").value.trim();
            let mobile = document.getElementById("s_mobile").value.trim();
            let pass = document.getElementById("s_pass").value.trim();

            if(!name || !mobile || !pass) {
                alert("Please fill all the details!");
                return;
            }
            if(mobile.length < 10) {
                alert("Please enter a valid 10-digit mobile number!");
                return;
            }

            document.getElementById("loader").style.display = "flex";

            try {
                // API call for signup
                let url = `${API_URL}?action=signup&name=${encodeURIComponent(name)}&mobile=${encodeURIComponent(mobile)}&pass=${encodeURIComponent(pass)}`;
                
                let response = await fetch(url, { redirect: "follow" });
                let result = await response.text();

                document.getElementById("loader").style.display = "none";

                if(result === "exists") {
                    alert("This Mobile Number is already registered! Please Login.");
                    window.location.href = "login.html";
                } else if(result === "success") {
                    alert("Registration Successful! Please login now.");
                    window.location.href = "login.html";
                } else {
                    alert("Something went wrong. Please try again.");
                }
            } catch(error) {
                document.getElementById("loader").style.display = "none";
                alert("Internet connection error!");
            }
        }
    </script>

</body>
</html>
