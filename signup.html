<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="card auth-card">
      <h2>Create Student Account</h2>
      <p class="small">Join the platform for tests, PDFs and video lectures.</p>
      <label>Full Name</label>
      <input class="input" id="name" type="text" placeholder="Student name" />
      <label>Mobile Number</label>
      <input class="input" id="mobile" type="tel" maxlength="10" placeholder="10 digit mobile" />
      <label>Password</label>
      <input class="input" id="password" type="password" placeholder="Create password" />
      <button class="btn btn-primary" style="width:100%;margin-top:12px;" onclick="register()">Sign Up</button>
      <p class="small">Already registered? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function register() {
      const name = document.getElementById('name').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      const password = document.getElementById('password').value.trim();

      if (name.length < 3) return alert('Enter full name');
      if (!/^\d{10}$/.test(mobile)) return alert('Valid 10 digit mobile required');
      if (password.length < 4) return alert('Password must be at least 4 characters');

      const users = getUsers();
      if (users.some(u => u.mobile === mobile)) return alert('Mobile already registered');
      users.push({ name, mobile, password, role: 'student' });
      writeJSON(APP_KEYS.users, users);

      alert('Registration successful. Please login.');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
