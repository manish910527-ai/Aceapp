<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Admin - Secure</title>
    <style>
        body { font-family: Arial, sans-serif; background: #001a33; margin: 0; padding: 15px; color: white; }
        #loginBox { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 320px; color: #333; text-align: center; }
        input[type="password"] { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 24px; text-align: center; letter-spacing: 10px; }
        #adminDashboard { display: none; background: #f0f2f5; min-height: 100vh; margin: -15px; padding: 15px; color: #333; }
        .header { background: #004a99; color: white; padding: 20px; text-align: center; font-weight: bold; border-radius: 0 0 15px 15px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid #004a99; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #004a99; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .hint { font-size: 11px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-card">
        <h2>ACE Admin</h2>
        <input type="password" id="adminPin" placeholder="****" maxlength="4">
        <button class="btn" onclick="checkLogin()">UNLOCK</button>
    </div>
</div>

<div id="adminDashboard">
    <div class="header">ACE HARDA MASTER ADMIN</div>
    
    <div class="card">
        <h3>📂 Add Content (Test/PDF)</h3>
        <select id="mainSec">
            <option>Course</option><option>Quiz</option><option>Test Series</option>
            <option>Previous Year</option><option>PDF Notes</option><option>Online Exam</option>
        </select>
        <select id="subFold">
            <option>CPCT</option><option>Tally</option><option>Basic Computer</option>
            <option>Maths</option><option>Science</option>
        </select>
        <select id="matType"><option>Test</option><option>PDF</option></select>
        <input type="text" id="iName" placeholder="Item Name / Tag">
        <input type="text" id="iID" placeholder="Sheet ID / Drive Link">
        <select id="iType"><option value="Paid">Paid</option><option value="Free">Free</option></select>
        <input type="number" id="iPrice" placeholder="Price (₹)">
        <button class="btn" onclick="submitData('add_content')">PUBLISH CONTENT</button>
    </div>

    <div class="card" style="border-color: #2e7d32;">
        <h3>✅ Unlock for Student</h3>
        <input type="text" id="uName" placeholder="Student Name">
        <input type="number" id="uMobile" placeholder="Mobile Number">
        <input type="text" id="uItemID" placeholder="Item Tag (e.g. CPCT_T1)">
        <button class="btn" style="background:#2e7d32;" onclick="submitData('approve_user')">UNLOCK NOW</button>
    </div>

    <button class="btn" style="background:#333;" onclick="logout()">LOGOUT</button>
</div>

<script>
    const MASTER_API_URL = "https://script.google.com/macros/s/AKfycbxF1CSdHyvTkKIMhP0AD-DpCOoL-dgYw3tHLYAzYdSfJlSOXegtjQ0RH0YpPQHmLP-d/exec";

    function checkLogin() {
        if(document.getElementById('adminPin').value === "9913") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
        } else { alert("Wrong PIN!"); }
    }

    function logout() { location.reload(); }

    async function submitData(actionType) {
        let payload = { action: actionType };
        if(actionType == 'add_content') {
            payload.mainSection = document.getElementById('mainSec').value;
            payload.subFolder = document.getElementById('subFold').value;
            payload.matType = document.getElementById('matType').value;
            payload.itemName = document.getElementById('iName').value;
            payload.fileId = document.getElementById('iID').value;
            payload.type = document.getElementById('iType').value;
            payload.price = document.getElementById('iPrice').value;
        } else if(actionType == 'approve_user') {
            payload.name = document.getElementById('uName').value;
            payload.mobile = document.getElementById('uMobile').value;
            payload.itemId = document.getElementById('uItemID').value;
        }

        if(!confirm("Proceed?")) return;
        try {
            let response = await fetch(MASTER_API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Success: " + await response.text());
            location.reload();
        } catch(e) { alert("Error!"); }
    }
</script>
</body>
</html>
