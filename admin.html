<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Master Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .header { background: #004a99; color: white; padding: 20px; text-align: center; font-weight: bold; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { color: #d32f2f; margin-top: 0; font-size: 18px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fafafa; }
        .btn { background: #004a99; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.98); background: #003366; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; font-weight: bold; color: #004a99; }
        
        /* Login Area */
        #loginBox { display: block; text-align: center; }
        #adminDashboard { display: none; }
    </style>
</head>
<body>

<div id="loading">⏳ Processing... Please wait</div>
<div class="header">ACE HARDA - MASTER CONTROL</div>

<div class="container">

    <div id="loginBox" class="card">
        <h3>🔐 Admin Login</h3>
        <p style="font-size: 14px; color: #666;">Secret PIN daalein Dashboard kholne ke liye</p>
        <input type="password" id="adminPin" placeholder="****" maxlength="4">
        <button class="btn" onclick="checkLogin()">UNLOCK PANEL</button>
    </div>

    <div id="adminDashboard">
        
        <div class="card">
            <h3>✅ Approve Payment (User)</h3>
            <input type="text" id="uName" placeholder="Student Full Name">
            <input type="number" id="uMobile" placeholder="Mobile Number">
            <button class="btn" onclick="submitData('approve_user')">ACTIVATE STUDENT</button>
        </div>

        <div class="card">
            <h3>📝 Add New Online Test</h3>
            <input type="text" id="tTopic" placeholder="Subject (e.g. MP ASI)">
            <input type="text" id="tName" placeholder="Test Name">
            <input type="text" id="tID" placeholder="Google Sheet ID of Questions">
            <select id="tType">
                <option value="Paid">Paid Test</option>
                <option value="Free">Free Test</option>
            </select>
            <input type="number" id="tPrice" placeholder="Price (0 if Free)">
            <button class="btn" style="background:#d32f2f;" onclick="submitData('add_test')">UPLOAD TO APP</button>
        </div>

        <div class="card">
            <h3>📚 Add New PDF Notes</h3>
            <input type="text" id="pName" placeholder="PDF Name">
            <input type="text" id="pLink" placeholder="Drive Link">
            <select id="pType">
                <option value="Paid">Paid PDF</option>
                <option value="Free">Free PDF</option>
            </select>
            <input type="number" id="pPrice" placeholder="Price (0 if Free)">
            <button class="btn" style="background:#2e7d32;" onclick="submitData('add_pdf')">UPLOAD PDF</button>
        </div>

        <div class="card">
            <h3>📢 Notice Board Update</h3>
            <input type="text" id="nMsg" placeholder="New Notification Message...">
            <button class="btn" style="background:#ff9800;" onclick="submitData('update_notif')">SEND NOTICE 🔔</button>
        </div>

        <button class="btn" style="background:#333; margin-bottom: 20px;" onclick="location.reload()">🔒 LOGOUT</button>
    </div>

</div>

<script>
    // 🔗 API CONNECTION (Connected with your URL)
    const MASTER_API_URL = "https://script.google.com/macros/s/AKfycboiKmqDdfRTuNglmjVouJwNILeDtPDV5qOXrTGhSzaN98-wTYldEpdSKJyeT-4Qb71/exec";
    const SECRET_PIN = "9913";

    function checkLogin() {
        if(document.getElementById('adminPin').value === SECRET_PIN) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
        } else {
            alert("❌ Galat PIN!");
        }
    }

    async function submitData(actionType) {
        let payload = { action: actionType };

        if(actionType == 'approve_user') {
            payload.name = document.getElementById('uName').value;
            payload.mobile = document.getElementById('uMobile').value;
            if(!payload.name || !payload.mobile) return alert("Details bhariye!");
        } else if(actionType == 'add_test') {
            payload.topic = document.getElementById('tTopic').value;
            payload.testName = document.getElementById('tName').value;
            payload.sheetId = document.getElementById('tID').value;
            payload.type = document.getElementById('tType').value;
            payload.price = document.getElementById('tPrice').value;
            if(!payload.testName || !payload.sheetId) return alert("Details bhariye!");
        } else if(actionType == 'add_pdf') {
            payload.pdfName = document.getElementById('pName').value;
            payload.pdfLink = document.getElementById('pLink').value;
            payload.type = document.getElementById('pType').value;
            payload.price = document.getElementById('tPrice').value;
            if(!payload.pdfName || !payload.pLink) return alert("Details bhariye!");
        } else if(actionType == 'update_notif') {
            payload.message = document.getElementById('nMsg').value;
            if(!payload.message) return alert("Message likhiye!");
        }

        if(!confirm("Kya aap confirm hain?")) return;

        document.getElementById('loading').style.display = 'flex';

        try {
            let response = await fetch(MASTER_API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            let result = await response.text();
            alert("Success: " + result);
            location.reload(); 
        } catch(e) {
            alert("Error: Internet ya API check karein.");
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
