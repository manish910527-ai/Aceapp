<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Admin</title>
    <style>
        body { font-family: Arial; background: #001a33; padding: 15px; color: white; }
        .card { background: white; padding: 20px; border-radius: 15px; color: #333; margin-bottom: 20px; border-top: 5px solid #004a99; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #004a99; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loginBox" style="text-align:center; padding-top:100px;">
        <div class="card">
            <h2>ACE Admin Panel</h2>
            <input type="password" id="adminPin" placeholder="Enter PIN" maxlength="4">
            <button class="btn" onclick="checkLogin()">UNLOCK</button>
        </div>
    </div>

    <div id="adminDashboard" style="display:none;">
        <div class="card">
            <h3 style="margin-top:0;">📂 Add Content</h3>
            <select id="mainSec">
                <option>Course</option><option>Quiz</option><option>Test Series</option>
                <option>Previous Year</option><option>PDF Notes</option><option>Online Exam</option>
            </select>
            <select id="subFold"><option>CPCT</option><option>Tally</option><option>Basic Computer</option><option>MPTET</option></select>
            <select id="matType"><option>Test</option><option>PDF</option><option>Video</option></select>
            <input type="text" id="iName" placeholder="Item Name (e.g. Mock Test 1)">
            <input type="text" id="iID" placeholder="Sheet ID / Google Drive Link">
            <select id="iType"><option value="Free">Free</option><option value="Paid">Paid</option></select>
            <input type="number" id="iPrice" placeholder="Price (₹)">
            <button class="btn" onclick="submitData()">PUBLISH NOW</button>
        </div>
    </div>

    <script>
        const MASTER_URL = "https://script.google.com/macros/s/AKfycbzNKt3R8LQe_BhKsQmjDvSddqx_mPY9kE4NMZ9WPxe-gFyWfhFaUd6GAgW9hxLoBkASVw/exec";
        
        function checkLogin() {
            if(document.getElementById('adminPin').value === "9913") {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
            } else { alert("Wrong PIN!"); }
        }

        async function submitData() {
            let payload = {
                action: 'add_content',
                mainSection: document.getElementById('mainSec').value,
                subFolder: document.getElementById('subFold').value,
                matType: document.getElementById('matType').value,
                itemName: document.getElementById('iName').value,
                fileId: document.getElementById('iID').value,
                type: document.getElementById('iType').value,
                price: document.getElementById('iPrice').value
            };
            try {
                let res = await fetch(MASTER_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert(await res.text());
                location.reload();
            } catch(e) { alert("Error!"); }
        }
    </script>
</body>
</html>
