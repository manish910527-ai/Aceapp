<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">
    <span>⚙️ Admin Control Panel</span>
    <div>
      <button class="btn btn-primary" onclick="location.href='dashboard.html'">Dashboard</button>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h3>Add New Content</h3>
      <div class="row">
        <div><label>Title</label><input class="input" id="title" /></div>
        <div><label>Type</label>
          <select id="type" onchange="toggleTypeFields()">
            <option value="test">Test</option>
            <option value="pdf">PDF</option>
            <option value="video">Video</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div><label>Access</label>
          <select id="access"><option value="free">Free</option><option value="paid">Paid</option></select>
        </div>
        <div><label>Price (for paid)</label><input class="input" id="price" type="number" value="0" /></div>
      </div>

      <div id="urlFields">
        <label>PDF / YouTube Link</label>
        <input class="input" id="url" placeholder="https://..." />
      </div>

      <div id="questionFields" style="display:none;">
        <label>Questions JSON</label>
        <textarea id="questions" rows="6" placeholder='[{"q":"2+2=?","options":["1","2","4","5"],"answer":2}]'></textarea>
        <p class="small">Use array of objects with q, options (4 values), answer index.</p>
      </div>

      <button class="btn btn-primary" onclick="saveContent()">Save Content</button>
    </div>

    <div class="card" style="margin-top:12px;">
      <h3>Existing Content</h3>
      <div id="list" class="item-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    ensureAuth(true);
    render();

    function toggleTypeFields() {
      const type = document.getElementById('type').value;
      document.getElementById('questionFields').style.display = type === 'test' ? 'block' : 'none';
      document.getElementById('urlFields').style.display = type === 'test' ? 'none' : 'block';
    }

    function saveContent() {
      const title = document.getElementById('title').value.trim();
      const type = document.getElementById('type').value;
      const access = document.getElementById('access').value;
      const price = Number(document.getElementById('price').value || 0);
      if (!title) return alert('Title required');

      const item = { id: crypto.randomUUID(), title, type, access, price };

      if (type === 'test') {
        try {
          const parsed = JSON.parse(document.getElementById('questions').value || '[]');
          if (!Array.isArray(parsed) || parsed.length === 0) throw new Error();
          item.questions = parsed;
        } catch {
          return alert('Valid test questions JSON is required');
        }
      } else {
        const url = document.getElementById('url').value.trim();
        if (!url.startsWith('http')) return alert('Valid URL required');
        item.url = url;
      }

      const content = getContent();
      content.push(item);
      setContent(content);
      alert('Content saved');
      render();
    }

    function removeItem(id) {
      const content = getContent().filter(c => c.id !== id);
      setContent(content);
      render();
    }

    function render() {
      const html = getContent().map(i => `
        <div class="card item">
          <div>
            <strong>${i.title}</strong><br/>
            <span class="small">${i.type.toUpperCase()} | ${i.access.toUpperCase()} ${i.price ? `| ₹${i.price}` : ''}</span>
          </div>
          <button class="btn btn-danger" onclick="removeItem('${i.id}')">Delete</button>
        </div>
      `).join('');
      document.getElementById('list').innerHTML = html || '<p class="small">No content yet.</p>';
    }
  </script>
</body>
</html>
