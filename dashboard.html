<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">
    <span>🎓 ACE Student Dashboard</span>
    <div>
      <button class="btn btn-warn" onclick="window.location.href='admin.html'">Admin</button>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="card" style="margin-bottom:12px;">
      <h3 id="welcome"></h3>
      <p class="small">Learn with tests, PDFs and video lectures.</p>
      <div class="grid" style="margin-top:10px;">
        <div class="menu-card"><strong>Total Tests</strong><h2 id="testCount">0</h2></div>
        <div class="menu-card"><strong>Total PDFs</strong><h2 id="pdfCount">0</h2></div>
        <div class="menu-card"><strong>Video Lectures</strong><h2 id="videoCount">0</h2></div>
      </div>
    </div>

    <div class="grid">
      <div class="menu-card"><h3>📝 Test Series</h3><button class="btn btn-primary" onclick="location.href='test_list.html'">Open Tests</button></div>
      <div class="menu-card"><h3>📚 PDF Notes</h3><button class="btn btn-primary" onclick="location.href='pdf_list.html'">Open PDFs</button></div>
      <div class="menu-card"><h3>▶️ Video Lectures</h3><button class="btn btn-primary" onclick="openVideos()">Watch Videos</button></div>
      <div class="menu-card"><h3>💳 My Purchases</h3><button class="btn btn-primary" onclick="location.href='payment.html'">Unlock Paid</button></div>
    </div>

    <div class="card" style="margin-top:12px;" id="videoContainer"></div>
  </div>

  <script src="app.js"></script>
  <script>
    const session = ensureAuth();
    if (session) {
      document.getElementById('welcome').textContent = `Welcome, ${session.name} (${session.role})`;
      const content = getContent();
      document.getElementById('testCount').textContent = content.filter(c => c.type === 'test').length;
      document.getElementById('pdfCount').textContent = content.filter(c => c.type === 'pdf').length;
      document.getElementById('videoCount').textContent = content.filter(c => c.type === 'video').length;
    }

    function openVideos() {
      const videos = getContent().filter(c => c.type === 'video');
      const html = videos.length ? videos.map(v => `
        <div class="item card" style="margin-bottom:8px;">
          <div>
            <strong>${v.title}</strong><br />
            <span class="tag ${v.access === 'paid' ? 'tag-paid' : 'tag-free'}">${v.access.toUpperCase()}</span>
          </div>
          <button class="btn btn-primary" onclick='playVideo("${v.id}")'>Open</button>
        </div>
      `).join('') : '<p class="small">No videos available.</p>';
      document.getElementById('videoContainer').innerHTML = `<h3>Video Lectures</h3>${html}`;
    }

    function playVideo(id) {
      const item = getContent().find(c => c.id === id);
      requirePaymentOrOpen(item, () => window.open(item.url, '_blank'));
    }
  </script>
</body>
</html>
