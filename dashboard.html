<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ACE HARDA</title>
    <style>
        body { margin: 0; font-family: Arial; background: #f4f7f9; padding-bottom: 20px; overflow-x: hidden; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 1000; transition: 0.4s; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }
        .sidebar-header { background: #004a99; color: white; padding: 30px 20px; text-align: center; }
        .sidebar-header img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #ffca28; margin-bottom: 10px; background: white; }
        .app-bar { background: #004a99; color: white; padding: 12px 10px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .app-bar-title { flex: 1; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .banner-container { margin: 10px; border-radius: 12px; overflow: hidden; border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .menu-btn { border: 2px solid #ffca28; border-radius: 12px; color: white; text-align: center; padding: 20px 5px; cursor: pointer; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .menu-btn .icon { font-size: 30px; margin-bottom: 8px; }
        .menu-btn .text { font-size: 13px; font-weight: bold; }
        
        /* FOOTER BANNER STYLES WAPAS ADD KIYE */
        .bottom-banner { background: linear-gradient(to right, #ffca28, #f57c00); margin: 15px 10px; padding: 15px; border-radius: 10px; color: black; font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .address-bar { background: #212121; color: white; text-align: center; padding: 8px; font-size: 11px; margin-top: 15px; border-radius: 5px; font-weight: bold; }

        #dynamicView { display: none; padding: 10px; }
        .back-nav { background: #333; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; cursor: pointer; }
        .item-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #004a99; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><img src="logo.png" alt="Logo"><h3>Student</h3><p>ACE Member</p></div>
        <div style="padding: 10px;">
            <a href="#" onclick="showHome(); closeMenu();" style="display:block; padding:15px; color:#333; text-decoration:none; font-weight:bold;">🏠 Home</a>
            <a href="admin.html" style="display:block; padding:15px; color:#888; text-decoration:none; font-size:13px; margin-top:20px;">⚙️ Admin Panel</a>
        </div>
    </div>

    <div class="app-bar">
        <div style="font-size:22px; cursor:pointer;" onclick="openMenu()">☰</div>
        <div class="app-bar-title" id="topTitle">ARITHMETIC COMPUTER EDUCATION</div>
    </div>

    <div id="homeView">
        <div class="banner-container"><img src="banner.png" style="width:100%;" onerror="this.src='https://via.placeholder.com/600x200?text=ACE+HARDA'"></div>
        
        <div class="grid-container">
            <div class="menu-btn" style="background:#1976d2;" onclick="openSection('Course')"><span class="icon">🎓</span><span class="text">Course</span></div>
            <div class="menu-btn" style="background:#00796b;" onclick="openSection('Quiz')"><span class="icon">⏱️</span><span class="text">Quiz</span></div>
            <div class="menu-btn" style="background:#303f9f;" onclick="openSection('Test Series')"><span class="icon">📊</span><span class="text">Test Series</span></div>
            <div class="menu-btn" style="background:#5d4037;" onclick="openSection('Previous Year')"><span class="icon">⏳</span><span class="text">Previous Year</span></div>
            <div class="menu-btn" style="background:#c62828;" onclick="window.location.href='payment.html'"><span class="icon">🛒</span><span class="text">Buy CPCT Course</span></div>
            <div class="menu-btn" style="background:#e64a19;" onclick="openSection('PDF Notes')"><span class="icon">📚</span><span class="text">Pdf Notes</span></div>
            <div class="menu-btn" style="background:#7b1fa2;" onclick="openSection('Online Exam')"><span class="icon">📝</span><span class="text">Online Exam</span></div>
            <div class="menu-btn" style="background:#2e7d32;" onclick="window.location.href='result.html'"><span class="icon">🏆</span><span class="text">My Result</span></div>
        </div>

        <div class="bottom-banner">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 8px; margin-bottom: 10px;">
                <h2 style="margin: 0; font-size: 16px; font-weight: 900;">ACE HARDA</h2>
                <div style="font-weight: bold;">📞 95897-69913</div>
            </div>
            <p style="margin: 0; font-weight: bold; line-height: 1.4;">Computer Courses • CPCT • Tally • MP ASI • MPTET</p>
            <div class="address-bar">📍 Harda, Madhya Pradesh</div>
        </div>
    </div>

    <div id="dynamicView">
        <div class="back-nav" id="backBtn" onclick="showHome()">⬅ GO BACK</div>
        <div class="grid-container" id="dynamicGrid"></div>
        <div id="dynamicList"></div>
    </div>

    <script>
        // AAPKA API LINK
        const MASTER_URL = "https://script.google.com/macros/s/AKfycbxA3pC19JyPPv--cTJbCBh5P1-YEnroJ9chtlKhkE4X0muUxI8-fPV9KRMf1vFHEgsEgw/exec";
        let allContent = [];

        window.onload = async () => {
            try { let res = await fetch(MASTER_URL); allContent = await res.json(); } catch(e) { console.log("Load Error"); }
        };

        function openMenu() { document.getElementById("sidebar").classList.add("active"); document.getElementById("overlay").classList.add("active"); }
        function closeMenu() { document.getElementById("sidebar").classList.remove("active"); document.getElementById("overlay").classList.remove("active"); }
        function showHome() { document.getElementById("homeView").style.display = "block"; document.getElementById("dynamicView").style.display = "none"; document.getElementById("topTitle").innerText = "ARITHMETIC COMPUTER EDUCATION"; }

        function openSection(name) {
            document.getElementById("homeView").style.display = "none";
            document.getElementById("dynamicView").style.display = "block";
            document.getElementById("dynamicList").innerHTML = "";
            document.getElementById("topTitle").innerText = name;
            document.getElementById("backBtn").onclick = showHome;

            const folders = [...new Set(allContent.filter(i => i.Main_Section === name).map(i => i.Sub_Folder))];
            let html = "";
            if(folders.length === 0) html = "<p style='grid-column:span 2; text-align:center;'>Jaldi hi data aayega...</p>";
            else folders.forEach(f => {
                html += `<div class="menu-btn" style="background:#00796b;" onclick="openFolder('${name}','${f}')"><span class="icon">📁</span><span class="text">${f}</span></div>`;
            });
            document.getElementById("dynamicGrid").innerHTML = html;
        }

        function openFolder(sec, fold) {
            document.getElementById("backBtn").onclick = () => openSection(sec);
            const types = [...new Set(allContent.filter(i => i.Main_Section === sec && i.Sub_Folder === fold).map(i => i.Material_Type))];
            let html = "";
            types.forEach(t => {
                let color = t==='Test'?'#d32f2f':(t==='PDF'?'#1976d2':'#f57c00');
                let icon = t==='Test'?'✍️':(t==='PDF'?'📚':'▶️');
                html += `<div class="menu-btn" style="background:${color};" onclick="openItems('${sec}','${fold}','${t}')"><span class="icon">${icon}</span><span class="text">${t}</span></div>`;
            });
            document.getElementById("dynamicGrid").innerHTML = html;
        }

        function openItems(sec, fold, typ) {
            document.getElementById("backBtn").onclick = () => openFolder(sec, fold);
            document.getElementById("dynamicGrid").innerHTML = "";
            const items = allContent.filter(i => i.Main_Section === sec && i.Sub_Folder === fold && i.Material_Type === typ);
            let html = "";
            items.forEach(i => {
                let isPaid = i.Access_Type === "Paid";
                html += `<div class="item-card"><div><b>${i.Item_Name_Tag}</b><br><small>${isPaid?'Paid':'Free'}</small></div>
                <button style="background:${isPaid?'#444':'#004a99'}; color:white; border:none; padding:8px 15px; border-radius:5px;" onclick="handle('${i.Item_Name_Tag}','${i.Link_or_ID}','${i.Access_Type}')">${isPaid?'BUY':'OPEN'}</button></div>`;
            });
            document.getElementById("dynamicList").innerHTML = html;
        }

        function handle(tag, link, access) {
            if(access === "Free") { 
                if(link.includes("http")) window.open(link, '_blank');
                else alert("Opening: " + tag);
            } else alert("Paid Content! Admin se unlock karwayein.");
        }
    </script>
</body>
</html>
