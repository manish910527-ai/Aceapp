<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Result | ACE Education</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar"><span>🏆 Test Result</span><button class="btn btn-primary" onclick="location.href='dashboard.html'">Dashboard</button></div>
  <div class="container">
    <div class="card" id="result"></div>
  </div>

  <script src="app.js"></script>
  <script>
    ensureAuth();
    const result = JSON.parse(localStorage.getItem('lastResult') || 'null');
    if (!result) {
      document.getElementById('result').innerHTML = '<p>No result yet.</p>';
    } else {
      const percent = Math.round((result.score / result.total) * 100);
      document.getElementById('result').innerHTML = `
        <h2>${result.title}</h2>
        <h1>${result.score}/${result.total} (${percent}%)</h1>
        <p class='small'>Submitted: ${result.date}</p>
      `;
    }
  </script>
</body>
</html>
